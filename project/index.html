<!doctype html>
<html lang="sv">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--Favicon-->
  <link rel="icon" type="image/png" href="./favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="./favicon/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="./favicon/apple-touch-icon.png" />

  <!--CSS-->
  <link rel="stylesheet" href="/src/scss/main.scss">

  <!--Google fonts-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">

  <title>Frontier Atalas</title>
</head>

<body>
  <!--Navigeringsmeny med logotyp-->
  <header>
    <!--Logotyp och headline-->
    <div class="sitelogo">
      <a href="index.html">
        <h1>FRONTIER ATLAS</h1>
      </a>
      <p class="tagline">A Far Cry series explorer</p>
    </div>
  </header>

  <main>
    <div class="pagewrapper">
      <section class="searchsection">
        <!--HUvudrubrik-->
        <h2>Search the world of Far Cry</h1>
          <!--Sökfunktion-->
          <div id="searchmessage"></div>
          <div class="searchwrap">

            <input type="text" id="searchinput" placeholder="ex: Far Cry 5">

            <button id="searchbtn"><img src="./images/searchicon.png" alt=""></button>
          </div>
      </section>

      <section>
        <!--Top 3 rankade Far cry spelen-->
        <h3 id="toptitle">Top Far Cry games</h2>
          <!--Hämtar data från Rawg-->
          <div id="topgames"></div>
      </section>

      <section>
        <!--Container för sökresultat. Data hämtas från Rawg-->
        <h3 id="searchtitle"></h3>
        <div id="searchresults"></div>
      </section>

      <!--Container för summering av spel. Data hämtas från wiki-->
      <section id="gamesummary"></section>
    </div>
  </main>
  <!--Footer med info om ägare av data och vem som gjort sida-->
  <footer>
    <div class="footer1">
      <p>Game data provided by the RAWG Video Games Database API.</p>
      <p>Game summaries from Wikipedia.</p>
      <p>Far Cry images belong to Ubisoft Entertainment.</p>
    </div>
    <div class="footer2">
      <p><strong>Website made by:</strong></p>
      <p>Daniela Giovanella<br>
        dagi2500@student.miun.se</p>
    </div>
  </footer>
  <script type="module" src="/src/js/main.js"></script>
</body>

</html>
